<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Shark Stats Admin - Refined</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --hero: #e83e8c; --gray: #666; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 900px; max-height: 90vh; border-radius: 15px; padding: 30px; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; border: none; background: none; color: #ccc; }
        
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        h2 { background: #333; color: white; padding: 10px 15px; border-radius: 6px; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        h2.hero-title { background: var(--hero); }
        section { margin-bottom: 40px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }

        .stage-table { width: 100%; border-collapse: collapse; }
        .stage-table th { background: #f8f9fa; border-bottom: 2px solid #eee; padding: 12px; font-size: 0.85em; color: var(--gray); }
        .stage-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        
        input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 0.9em; }
        input[type="number"] { width: 85px; }
        .input-id { background: #fff9db; font-weight: bold; border-color: #fab005; }
        
        .sub-text { font-size: 0.75em; color: #999; display: block; margin-top: 2px; }

        .btn { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--primary); padding: 5px 12px; font-size: 0.8em; }
        .btn-del { background: var(--danger); padding: 4px 8px; font-size: 0.8em; }
        .btn-save { width: 100%; padding: 20px; background: var(--success); font-size: 1.2em; margin-top: 20px; border-radius: 10px; }
        .btn:hover { opacity: 0.8; }

        .open-trigger { padding: 15px 30px; font-size: 1.1em; cursor: pointer; }
    </style>
</head>
<body>

<button class="open-trigger" onclick="toggleModal(true)">⚙️ 샤크 데이터 관리 팝업</button>

<div id="adminModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <button class="close-btn" onclick="toggleModal(false)">&times;</button>
        <h1>Shark Statistics Management</h1>

        <section>
            <h2>1. Mega Shark <button class="btn btn-add" onclick="addRow('mega-body')">+ 스테이지 추가</button></h2>
            <table class="stage-table">
                <thead>
                    <tr>
                        <th width="25%">Stage ID</th>
                        <th width="30%">Catch Ratio (%)</th>
                        <th width="30%">Credit (%) <span class="sub-text">(기존 보상 대비)</span></th>
                        <th width="15%">삭제</th>
                    </tr>
                </thead>
                <tbody id="mega-body"></tbody>
            </table>
        </section>

        <section>
            <h2>2. Shark <button class="btn btn-add" onclick="addRow('shark-body')">+ 스테이지 추가</button></h2>
            <table class="stage-table">
                <thead>
                    <tr>
                        <th width="25%">Stage ID</th>
                        <th width="30%">Catch Ratio (%)</th>
                        <th width="30%">Credit (%) <span class="sub-text">(기존 보상 대비)</span></th>
                        <th width="15%">삭제</th>
                    </tr>
                </thead>
                <tbody id="shark-body"></tbody>
            </table>
        </section>

        <section>
            <h2 class="hero-title">3. Hero Shark <button class="btn btn-add" onclick="addRow('hero-body', true)">+ 히어로 추가</button></h2>
            <table class="stage-table">
                <thead>
                    <tr>
                        <th width="15%">Shark ID</th>
                        <th width="20%">Cooltime (hr)</th>
                        <th width="25%">Respawn Count <span class="sub-text">(쿨타임 적용될 마리 수)</span></th>
                        <th width="25%">Max Spawn Count <span class="sub-text">(최대 스폰 수)</span></th>
                        <th width="15%">삭제</th>
                    </tr>
                </thead>
                <tbody id="hero-body"></tbody>
            </table>
        </section>

        <button class="btn btn-save" onclick="saveData()">모든 세팅값 저장 및 적용</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'shark_admin_v6';

    function toggleModal(show) {
        document.getElementById('adminModal').style.display = show ? 'flex' : 'none';
        if (show) loadData();
    }

    function addRow(targetId, isHero = false, data = {}) {
        const tbody = document.getElementById(targetId);
        const tr = document.createElement('tr');
        
        if (!isHero) {
            tr.innerHTML = `
                <td><input type="number" class="st-id input-id" value="${data.stageId || ''}" placeholder="Stage ID"></td>
                <td><input type="number" class="st-catch" value="${data.catchRatio || ''}"></td>
                <td><input type="number" class="st-credit" value="${data.credit || ''}"></td>
                <td><button class="btn btn-del" onclick="this.parentElement.parentElement.remove()">삭제</button></td>
            `;
        } else {
            tr.innerHTML = `
                <td><input type="number" class="h-id input-id" value="${data.id || ''}" placeholder="Hero ID"></td>
                <td><input type="number" class="h-cool" value="${data.cool || ''}"></td>
                <td><input type="number" class="h-res" value="${data.respawn || ''}"></td>
                <td><input type="number" class="h-max" value="${data.max || ''}"></td>
                <td><button class="btn btn-del" onclick="this.parentElement.parentElement.remove()">삭제</button></td>
            `;
        }
        tbody.appendChild(tr);
    }

    function saveData() {
        const extractBasic = (tbodyId) => {
            return Array.from(document.querySelectorAll(`#${tbodyId} tr`)).map(tr => ({
                stageId: tr.querySelector('.st-id').value,
                catchRatio: tr.querySelector('.st-catch').value,
                credit: tr.querySelector('.st-credit').value
            }));
        };

        const extractHero = () => {
            return Array.from(document.querySelectorAll('#hero-body tr')).map(tr => ({
                id: tr.querySelector('.h-id').value,
                cool: tr.querySelector('.h-cool').value,
                respawn: tr.querySelector('.h-res').value,
                max: tr.querySelector('.h-max').value
            }));
        };

        const finalData = {
            megaShark: extractBasic('mega-body'),
            shark: extractBasic('shark-body'),
            heroShark: extractHero()
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(finalData));
        alert("데이터가 저장되었습니다.");
        toggleModal(false);
    }

    function loadData() {
        document.getElementById('mega-body').innerHTML = '';
        document.getElementById('shark-body').innerHTML = '';
        document.getElementById('hero-body').innerHTML = '';

        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;

        const data = JSON.parse(saved);
        if (data.megaShark) data.megaShark.forEach(d => addRow('mega-body', false, d));
        if (data.shark) data.shark.forEach(d => addRow('shark-body', false, d));
        if (data.heroShark) data.heroShark.forEach(d => addRow('hero-body', true, d));
    }

    window.onload = loadData;
</script>

</body>
</html>
