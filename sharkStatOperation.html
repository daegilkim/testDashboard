<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Shark Stats Admin - Fixed</title>
    <style>
        :root { --primary-color: #007bff; --success-color: #28a745; --danger-color: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 600px; max-height: 85vh; border-radius: 12px; position: relative; padding: 25px; overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; border: none; background: none; color: #aaa; }
        
        h2 { margin-top: 0; font-size: 1.1em; color: var(--primary-color); display: flex; justify-content: space-between; align-items: center; }
        section { margin-bottom: 25px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        
        .input-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .label-area { display: flex; flex-direction: column; }
        .label-main { font-size: 0.9em; color: #333; font-weight: bold; }
        .label-sub { font-size: 0.75em; color: #888; margin-top: 2px; } /* 기존 보상 대비 문구 스타일 */

        .input-field { display: flex; align-items: center; }
        .input-field input { width: 80px; padding: 6px; border: 1px solid #ddd; border-radius: 4px; text-align: right; }
        .unit { width: 35px; margin-left: 8px; font-size: 0.85em; color: #777; }

        .hero-item { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 6px; margin-bottom: 12px; position: relative; }
        .hero-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        
        .btn { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: var(--primary-color); padding: 6px 14px; font-size: 0.8em; }
        .btn-del { background: var(--danger-color); padding: 4px 10px; font-size: 0.75em; }
        .btn-save { width: 100%; padding: 16px; background: var(--success-color); font-size: 1.1em; margin-top: 10px; }
        .btn:hover { opacity: 0.9; }
        
        .open-trigger { margin: 50px; padding: 15px 30px; cursor: pointer; }
    </style>
</head>
<body>

<button class="open-trigger" onclick="toggleModal(true)">운영툴: 스탯 조정 팝업</button>

<div id="sharkModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <button class="close-btn" onclick="toggleModal(false)">&times;</button>
        <h1 style="text-align: center; margin-bottom: 25px;">🦈 Shark Stats Admin</h1>

        <section>
            <h2>1. Mega Shark</h2>
            <div class="input-group">
                <div class="label-area"><span class="label-main">Catch Ratio</span></div>
                <div class="input-field"><input type="number" id="ms-catch"><span class="unit">%</span></div>
            </div>
            <div class="input-group">
                <div class="label-area">
                    <span class="label-main">Credit</span>
                    <span class="label-sub">( 기존 보상 대비 )</span>
                </div>
                <div class="input-field"><input type="number" id="ms-credit"><span class="unit">%</span></div>
            </div>
            <div class="input-group">
                <div class="label-area">
                    <span class="label-main">EXP</span>
                    <span class="label-sub">( 기존 보상 대비 )</span>
                </div>
                <div class="input-field"><input type="number" id="ms-exp"><span class="unit">%</span></div>
            </div>
        </section>

        <section>
            <h2>2. Shark</h2>
            <div class="input-group">
                <div class="label-area"><span class="label-main">Catch Ratio</span></div>
                <div class="input-field"><input type="number" id="s-catch"><span class="unit">%</span></div>
            </div>
            <div class="input-group">
                <div class="label-area">
                    <span class="label-main">Credit</span>
                    <span class="label-sub">( 기존 보상 대비 )</span>
                </div>
                <div class="input-field"><input type="number" id="s-credit"><span class="unit">%</span></div>
            </div>
            <div class="input-group">
                <div class="label-area">
                    <span class="label-main">EXP</span>
                    <span class="label-sub">( 기존 보상 대비 )</span>
                </div>
                <div class="input-field"><input type="number" id="s-exp"><span class="unit">%</span></div>
            </div>
        </section>

        <section id="hero-section">
            <h2>
                3. Hero Shark List
                <button class="btn btn-add" onclick="addHeroItem()">+ 항목 추가</button>
            </h2>
            <div id="hero-container"></div>
        </section>

        <button class="btn btn-save" onclick="saveAndApply()">설정 저장 및 데이터 반영</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'shark_stats_v3';

    function toggleModal(show) {
        document.getElementById('sharkModal').style.display = show ? 'flex' : 'none';
        if (show) loadStats();
    }

    // Hero Shark HTML 생성
    function createHeroItemHTML(data = {id:'', cool:'', respawn:'', max:''}) {
        const div = document.createElement('div');
        div.className = 'hero-item';
        div.innerHTML = `
            <div class="hero-header">
                <strong>Hero Shark Group</strong>
                <button class="btn btn-del" onclick="this.parentElement.parentElement.remove()">삭제</button>
            </div>
            <div class="input-group"><label class="label-main">Shark Id</label><div class="input-field"><input type="number" class="hs-id" value="${data.id}"> <span class="unit">ID</span></div></div>
            <div class="input-group"><label class="label-main">Spawn Cooltime</label><div class="input-field"><input type="number" class="hs-cool" value="${data.cool}"> <span class="unit">s</span></div></div>
            <div class="input-group"><label class="label-main">Respawn Count</label><div class="input-field"><input type="number" class="hs-respawn" value="${data.respawn}"> <span class="unit">ea</span></div></div>
            <div class="input-group"><label class="label-main">Max Spawn Count</label><div class="input-field"><input type="number" class="hs-max" value="${data.max}"> <span class="unit">ea</span></div></div>
        `;
        return div;
    }

    function addHeroItem(data) {
        document.getElementById('hero-container').appendChild(createHeroItemHTML(data));
    }

    // 로드 로직
    function loadStats() {
        const saved = localStorage.getItem(STORAGE_KEY);
        const container = document.getElementById('hero-container');
        container.innerHTML = ''; // 중복 로드 방지

        if (!saved) return;
        
        const data = JSON.parse(saved);
        
        // Basic Sharks
        document.getElementById('ms-catch').value = data.megaShark.catchRatio;
        document.getElementById('ms-credit').value = data.megaShark.credit;
        document.getElementById('ms-exp').value = data.megaShark.exp;
        document.getElementById('s-catch').value = data.shark.catchRatio;
        document.getElementById('s-credit').value = data.shark.credit;
        document.getElementById('s-exp').value = data.shark.exp;

        // Hero Sharks 리스트 복구
        if (data.heroSharks && Array.isArray(data.heroSharks)) {
            data.heroSharks.forEach(hero => addHeroItem(hero));
        }
    }

    // 저장 로직
    function saveAndApply() {
        // Hero Shark 데이터들 수집
        const heroItems = document.querySelectorAll('.hero-item');
        const heroList = [];
        
        heroItems.forEach(item => {
            heroList.push({
                id: item.querySelector('.hs-id').value,
                cool: item.querySelector('.hs-cool').value,
                respawn: item.querySelector('.hs-respawn').value,
                max: item.querySelector('.hs-max').value
            });
        });

        const finalData = {
            megaShark: {
                catchRatio: document.getElementById('ms-catch').value,
                credit: document.getElementById('ms-credit').value,
                exp: document.getElementById('ms-exp').value
            },
            shark: {
                catchRatio: document.getElementById('s-catch').value,
                credit: document.getElementById('s-credit').value,
                exp: document.getElementById('s-exp').value
            },
            heroSharks: heroList
        };

        // 로컬스토리지 저장
        localStorage.setItem(STORAGE_KEY, JSON.stringify(finalData));
        
        console.log("저장된 데이터 구조:", finalData);
        alert("데이터가 로컬스토리지에 안전하게 저장되었습니다.");
        toggleModal(false);
    }

    window.onload = loadStats;
</script>

</body>
</html>
